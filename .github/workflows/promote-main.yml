# ──────────────────────────────────────────────────────────────
# Supersubset — Promote to Main
# Manual workflow to create a PR from staging → main.
# Runs full test suite. Human must approve and merge.
# ──────────────────────────────────────────────────────────────
name: Promote to Main

on:
  workflow_dispatch:
    inputs:
      description:
        description: 'Release description (shown in PR body)'
        required: false
        default: 'Promote staging → main for release'

permissions:
  contents: write
  pull-requests: write

env:
  NODE_VERSION: '22'

jobs:
  create-promotion-pr:
    name: Create Promotion PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          LAST_MAIN=$(git merge-base origin/main origin/staging 2>/dev/null || echo "")
          if [ -n "$LAST_MAIN" ]; then
            LOG=$(git log --oneline "$LAST_MAIN"..origin/staging)
          else
            LOG=$(git log --oneline origin/staging -30)
          fi
          echo "$LOG" > /tmp/changelog.txt
          echo "count=$(echo "$LOG" | wc -l | tr -d ' ')" >> "$GITHUB_OUTPUT"

      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CHANGELOG=$(cat /tmp/changelog.txt)
          BODY="## Promote staging → main (release)

          ${{ github.event.inputs.description }}

          ### Commits included (${{ steps.changelog.outputs.count }})

          \`\`\`
          ${CHANGELOG}
          \`\`\`

          ### Release Checklist
          - [ ] Full test suite passes (CI will verify)
          - [ ] E2E tests pass
          - [ ] QA sign-off on staging
          - [ ] Release notes prepared
          - [ ] No outstanding critical issues
          "

          EXISTING=$(gh pr list --base main --head staging --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            echo "Promotion PR #$EXISTING already exists — updating body"
            gh pr edit "$EXISTING" --body "$BODY"
          else
            gh pr create \
              --base main \
              --head staging \
              --title "chore: promote staging → main" \
              --body "$BODY" \
              --label "promotion,release"
          fi

  # Full suite on main promotion
  full-tests:
    name: Full Test Suite
    needs: create-promotion-pr
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: staging
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test
      - run: pnpm typecheck
      - run: pnpm lint

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm test:e2e --project=chromium
        env:
          CI: true

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: release-playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
