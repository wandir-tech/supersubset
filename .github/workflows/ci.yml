# ──────────────────────────────────────────────────────────────
# Supersubset — CI Pipeline
# Runs on every PR targeting develop, staging, or main.
# Each job reports independently so PRs show granular status.
#
# Every job does its own checkout + install + build because
# inter-package deps need compiled .d.ts / dist output.
# pnpm caching keeps installs fast across parallel jobs.
# ──────────────────────────────────────────────────────────────
name: CI

on:
  pull_request:
    branches: [develop, staging, main]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
  NODE_VERSION: '22'

permissions:
  contents: read
  pull-requests: read

jobs:
  # ── Change Detection ───────────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            code:
              - 'packages/**'
              - '!packages/docs/**'
              - 'examples/**'
              - 'e2e/**'
              - 'src/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.json'
              - 'nx.json'
              - 'eslint.config.*'
              - 'playwright.config.*'
              - '.github/workflows/**'
              - '.github/actions/**'

  # ── Build ──────────────────────────────────────────────────
  build:
    name: Build
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  # ── Lint ───────────────────────────────────────────────────
  lint:
    name: Lint
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - uses: nrwl/nx-set-shas@v5

      - run: npx nx affected -t lint

  # ── Format Check ───────────────────────────────────────────
  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
        continue-on-error: true # TODO: remove after running `pnpm format` on the full codebase

  # ── Typecheck ──────────────────────────────────────────────
  typecheck:
    name: Typecheck
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - uses: nrwl/nx-set-shas@v5

      - run: npx nx affected -t typecheck

  # ── Unit Tests ─────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - uses: nrwl/nx-set-shas@v5

      - run: npx nx affected -t test

  # ── E2E (Playwright) ──────────────────────────────────────
  e2e:
    name: E2E Tests
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests (exclude visual regression)
        run: pnpm test:e2e --project=chromium --grep-invert "Visual Regression"
        env:
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/

      - name: Upload snapshot baselines
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-snapshots
          path: e2e/**/*-snapshots/
          retention-days: 7

  # ── Security (Snyk) ───────────────────────────────────────
  security:
    name: Security Scan
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Snyk code scan
        if: env.SNYK_TOKEN != ''
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: code test
          args: --severity-threshold=high

  # ── CI Gate (required check for branch protection) ─────────
  ci-gate:
    name: CI Gate
    if: always()
    needs: [changes, build, lint, format, typecheck, unit-tests, e2e, security]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          # If code changed, all code jobs must have succeeded
          if [[ "${{ needs.changes.outputs.code }}" == "true" ]]; then
            results=(
              "${{ needs.build.result }}"
              "${{ needs.lint.result }}"
              "${{ needs.typecheck.result }}"
              "${{ needs.unit-tests.result }}"
              "${{ needs.e2e.result }}"
              "${{ needs.security.result }}"
            )
            for r in "${results[@]}"; do
              if [[ "$r" != "success" ]]; then
                echo "❌ A required job failed or was cancelled: $r"
                exit 1
              fi
            done
          fi
          echo "✅ All required checks passed (or the product-code pipeline was skipped)"
