# ──────────────────────────────────────────────────────────────
# Supersubset — Release Pipeline
# Runs on every push to `main`:
#   - If there are pending changesets, opens/updates a "Version
#     Packages" PR that bumps versions and writes CHANGELOGs.
#   - Merging that PR triggers this workflow again; the publish
#     step detects that versions are bumped and publishes every
#     public `@supersubset/*` package to npm.
#
# Requires repository secret: NPM_TOKEN (npm automation token with
# publish access to the @supersubset scope).
# ──────────────────────────────────────────────────────────────
name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      - name: Create Release PR or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm run version-packages
          publish: pnpm run release
          commit: 'chore(release): version packages'
          title: 'chore(release): version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
